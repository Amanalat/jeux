<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Crée ton explorateur — Mode Exploration</title>
<style>
  :root{
    --bg:#0b1220; --bg2:#0f172a; --card:#182338; --card2:#1f2c45;
    --txt:#e8eef7; --doux:#93a4bd; --acc:#38bdf8; --acc2:#a78bfa; --bord:#31415a;
    --ok:#34d399;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:system-ui,"Segoe UI",Roboto,sans-serif; color:var(--txt);
    background:radial-gradient(1100px 550px at 50% -10%, #16233d 0%, var(--bg) 60%); min-height:100vh; }
  a.back{ display:inline-block; margin:18px 0 0 20px; color:var(--acc); text-decoration:none; font-size:.9em; }
  header{ text-align:center; padding:10px 20px 4px; }
  header h1{ margin:.2em 0 .1em; font-size:1.9em; letter-spacing:-.4px; }
  header p{ margin:0 auto; max-width:520px; color:var(--doux); line-height:1.5; }

  .wrap{ display:grid; grid-template-columns:minmax(260px,360px) 1fr; gap:26px;
    max-width:1040px; margin:22px auto; padding:0 20px 70px; align-items:start; }
  @media (max-width:820px){ .wrap{ grid-template-columns:1fr; } }

  /* Aperçu */
  .preview{ position:sticky; top:16px; background:linear-gradient(180deg,var(--card),var(--card2));
    border:1px solid var(--bord); border-radius:20px; padding:18px; text-align:center; }
  .stage{ background:radial-gradient(120% 90% at 50% 20%, #24344f 0%, #101a2c 100%);
    border-radius:16px; padding:8px; }
  .stage svg{ width:100%; height:auto; max-height:380px; display:block; }
  .nom-aff{ margin-top:12px; font-size:1.15em; font-weight:700; min-height:1.2em; }
  .genre-aff{ color:var(--doux); font-size:.85em; }

  /* Contrôles */
  .controls{ display:flex; flex-direction:column; gap:18px; }
  .field{ background:var(--card); border:1px solid var(--bord); border-radius:16px; padding:14px 16px; }
  .field > label.title{ display:block; font-weight:700; margin-bottom:10px; font-size:.98em; }
  .field .hint{ color:var(--doux); font-weight:400; font-size:.82em; }

  input[type=text]{ width:100%; background:#0c1524; border:1px solid var(--bord); color:var(--txt);
    border-radius:10px; padding:10px 12px; font-size:1em; }
  input[type=text]:focus{ outline:none; border-color:var(--acc); }

  .swatches{ display:flex; flex-wrap:wrap; gap:9px; }
  .sw{ width:34px; height:34px; border-radius:50%; cursor:pointer; border:3px solid transparent;
    transition:transform .12s; box-shadow:0 0 0 1px rgba(255,255,255,.12) inset; }
  .sw:hover{ transform:scale(1.1); }
  .sw.sel{ border-color:#fff; transform:scale(1.12); }

  .choices{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ background:#0c1524; border:1px solid var(--bord); color:var(--txt); border-radius:999px;
    padding:8px 14px; cursor:pointer; font-size:.92em; transition:.12s; }
  .chip:hover{ border-color:var(--acc); }
  .chip.sel{ background:var(--acc); color:#062033; border-color:var(--acc); font-weight:700; }

  .slider-row{ display:flex; align-items:center; gap:12px; }
  input[type=range]{ flex:1; accent-color:var(--acc); }
  .ends{ display:flex; justify-content:space-between; color:var(--doux); font-size:.8em; margin-top:4px; }

  .toggles{ display:flex; gap:10px; flex-wrap:wrap; }

  .actions{ display:flex; gap:12px; flex-wrap:wrap; margin-top:4px; }
  button.act{ flex:1; min-width:150px; border:none; border-radius:12px; padding:14px 16px; font-size:1em;
    font-weight:700; cursor:pointer; transition:.15s; }
  .btn-rand{ background:#0c1524; color:var(--txt); border:1px solid var(--bord); }
  .btn-rand:hover{ border-color:var(--acc2); }
  .btn-go{ background:linear-gradient(90deg,var(--acc),var(--acc2)); color:#08131f; }
  .btn-go:hover{ filter:brightness(1.08); }

  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(120px);
    background:var(--ok); color:#04231a; padding:14px 22px; border-radius:12px; font-weight:700;
    box-shadow:0 12px 30px rgba(0,0,0,.5); transition:transform .35s cubic-bezier(.2,1.4,.4,1); z-index:50; }
  .toast.show{ transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <a class="back" href="../index.html">← Retour aux jeux</a>
  <header>
    <h1>🧭 Crée ton explorateur</h1>
    <p>Avant de partir à la découverte des jeux, façonne l'avatar qui te représentera.</p>
  </header>

  <div class="wrap">
    <!-- Aperçu -->
    <div class="preview">
      <div class="stage"><svg id="avatar" viewBox="0 0 240 380" aria-label="Aperçu de l'avatar"></svg></div>
      <div class="nom-aff" id="nomAff">Explorateur·rice</div>
      <div class="genre-aff" id="genreAff"></div>
    </div>

    <!-- Contrôles -->
    <div class="controls">
      <div class="field">
        <label class="title" for="nom">Ton nom d'explorateur</label>
        <input type="text" id="nom" maxlength="24" placeholder="Ex : Sam, Léa, Robin…">
      </div>

      <div class="field">
        <label class="title">Genre</label>
        <div class="choices" id="genre"></div>
      </div>

      <div class="field">
        <label class="title">Couleur de peau</label>
        <div class="swatches" id="peau"></div>
      </div>

      <div class="field">
        <label class="title">Cheveux <span class="hint">— style</span></label>
        <div class="choices" id="cheveuxStyle" style="margin-bottom:12px;"></div>
        <label class="title" style="margin-bottom:8px;">Couleur des cheveux</label>
        <div class="swatches" id="cheveuxCouleur"></div>
      </div>

      <div class="field">
        <label class="title">Habit <span class="hint">— forme &amp; costumes</span></label>
        <div class="choices" id="habitForme" style="margin-bottom:12px;"></div>
        <label class="title" style="margin-bottom:8px;">Couleur de l'habit</label>
        <div class="swatches" id="habit"></div>
      </div>

      <div class="field">
        <label class="title">Taille</label>
        <div class="slider-row"><input type="range" id="taille" min="0.86" max="1.14" step="0.02" value="1"></div>
        <div class="ends"><span>Petit·e</span><span>Grand·e</span></div>
      </div>

      <div class="field">
        <label class="title">Corpulence</label>
        <div class="slider-row"><input type="range" id="corpulence" min="0.82" max="1.28" step="0.02" value="1"></div>
        <div class="ends"><span>Mince</span><span>Costaud·e</span></div>
      </div>

      <div class="field">
        <label class="title">Détails</label>
        <div class="toggles" id="options"></div>
      </div>

      <div class="actions">
        <button class="act btn-rand" id="rand">🎲 Aléatoire</button>
        <button class="act btn-go" id="go">✓ Valider mon avatar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Avatar enregistré ✓</div>

<script>
/* =====================================================================
   CRÉATEUR D'AVATAR — Mode Exploration
   L'avatar est sauvegardé dans localStorage sous la clé STORAGE_KEY.
   La suite du jeu pourra le relire via  Avatar.load()  (voir bas de page).
   ===================================================================== */
(function(){
  'use strict';
  const STORAGE_KEY = 'jeux.exploration.avatar.v1';

  /* --- Palettes --- */
  const PEAUX   = ['#ffe0bd','#f6cfa2','#e9b382','#d69a63','#b97a45','#8d5524','#653a1e','#4a2a15'];
  const CHEVEUX = ['#111111','#3b2417','#6b4423','#8b5a2b','#b07a3f','#d9b55e','#efd27a',
                   '#b0453a','#d94f2b','#e8e8e8','#7a4fd1','#2e8b57','#2f7bd6'];
  const HABITS  = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#16a085','#3498db','#2c3e50',
                   '#9b59b6','#e84393','#ecf0f1','#111827'];
  const STYLES  = [['chauve','Chauve'],['court','Court'],['carre','Carré'],['long','Long'],
                   ['couettes','Couettes'],['chignon','Chignon'],['crete','Crête'],['boucle','Bouclé']];
  const FORMES  = [['tshirt','T-shirt'],['pull','Pull'],['chemise','Chemise'],['robe','Robe'],
                   ['debardeur','Débardeur'],['cavernes','🦴 Cavernes'],['cosmonaute','🚀 Cosmonaute']];
  const GENRES  = [['homme','♂ Homme'],['femme','♀ Femme'],['indifferent','⚧ Indifférent']];

  /* --- État --- */
  const state = {
    nom:'', genre:'indifferent',
    peau:'#f6cfa2', cheveuxCouleur:'#6b4423', cheveuxStyle:'court',
    habit:'#3498db', habitForme:'tshirt', taille:1, corpulence:1, lunettes:false, barbe:false
  };

  /* --- Utilitaires couleur (dégradés & contours) --- */
  function h2r(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');
    return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)];}
  function r2h(r,g,b){return '#'+[r,g,b].map(x=>{x=Math.max(0,Math.min(255,Math.round(x)));
    return x.toString(16).padStart(2,'0');}).join('');}
  function shade(hex,a){const [r,g,b]=h2r(hex);
    if(a<0){const f=1+a;return r2h(r*f,g*f,b*f);}
    return r2h(r+(255-r)*a,g+(255-g)*a,b+(255-b)*a);}

  function silhouette(g){
    if(g==='homme')  return {sh:58, hh:42};
    if(g==='femme')  return {sh:44, hh:54};
    return {sh:51, hh:48};
  }

  function render(){
    const {sh,hh}=silhouette(state.genre);
    const skin=state.peau, hair=state.cheveuxCouleur, habit=state.habit;
    const skinD=shade(skin,-0.16), skinLine=shade(skin,-0.42);
    const hairD=shade(hair,-0.30), hairL=shade(hair,0.40), hairLine=shade(hair,-0.55);
    const habitLine=shade(habit,-0.40);
    const pant='#3d4c66', pantLine='#28324a', shoe='#252f3e';

    const cx=120, headCy=106, headRx=37, headRy=43, headTop=headCy-headRy, headBot=headCy+headRy;
    const shoulderY=168, hipY=262, footY=352, groundY=360;

    /* Dégradés */
    const defs = `<defs>`+
      `<radialGradient id="gSkin" cx="42%" cy="34%" r="78%">`+
        `<stop offset="0%" stop-color="${shade(skin,0.24)}"/>`+
        `<stop offset="62%" stop-color="${skin}"/>`+
        `<stop offset="100%" stop-color="${skinD}"/></radialGradient>`+
      `<linearGradient id="gHair" x1="0" y1="0" x2="0.25" y2="1">`+
        `<stop offset="0%" stop-color="${hairL}"/>`+
        `<stop offset="48%" stop-color="${hair}"/>`+
        `<stop offset="100%" stop-color="${hairD}"/></linearGradient>`+
      `<linearGradient id="gCloth" x1="0.15" y1="0" x2="0.5" y2="1">`+
        `<stop offset="0%" stop-color="${shade(habit,0.20)}"/>`+
        `<stop offset="55%" stop-color="${habit}"/>`+
        `<stop offset="100%" stop-color="${shade(habit,-0.22)}"/></linearGradient>`+
      `<linearGradient id="gPant" x1="0" y1="0" x2="0" y2="1">`+
        `<stop offset="0%" stop-color="${pant}"/>`+
        `<stop offset="100%" stop-color="${shade(pant,-0.22)}"/></linearGradient>`+
      `<linearGradient id="gSuit" x1="0" y1="0" x2="0.3" y2="1">`+
        `<stop offset="0%" stop-color="#f7fafc"/><stop offset="60%" stop-color="#e2e8f0"/>`+
        `<stop offset="100%" stop-color="#c2ccd8"/></linearGradient>`+
      `<linearGradient id="gFur" x1="0" y1="0" x2="0.2" y2="1">`+
        `<stop offset="0%" stop-color="#a8865c"/><stop offset="55%" stop-color="#8a6a45"/>`+
        `<stop offset="100%" stop-color="#6b5236"/></linearGradient>`+
    `</defs>`;

    const ground = `<ellipse cx="${cx}" cy="${groundY}" rx="62" ry="8.5" fill="#000" opacity="0.22"/>`;

    /* ---------- CORPS (mis à l'échelle par la corpulence) ---------- */
    const form=state.habitForme||'tshirt';
    const habitL=shade(habit,0.18), midY=(shoulderY+hipY)/2;
    const legW=30, gap=8, lX=cx-gap/2-legW, rX=cx+gap/2, legTop=hipY-18, legH=footY-legTop-4;
    const armW=17, sleeveW=21, aTop=shoulderY+4, aBot=hipY+8, lc=cx-sh+3, rc=cx+sh-3;
    const longEnd=aBot-2, shortEnd=aTop+30;

    // briques réutilisables
    function legsFn(fill, line, shoeF, shoeL){
      return `<g stroke="${line}" stroke-width="2.5" stroke-linejoin="round">`+
        `<rect x="${lX}" y="${legTop}" width="${legW}" height="${legH}" rx="11" fill="${fill}"/>`+
        `<rect x="${rX}" y="${legTop}" width="${legW}" height="${legH}" rx="11" fill="${fill}"/></g>`+
        `<g fill="${shoeF}" stroke="${shoeL}" stroke-width="2" stroke-linejoin="round">`+
        `<rect x="${lX-4}" y="${footY-9}" width="${legW+11}" height="15" rx="7"/>`+
        `<rect x="${rX-7}" y="${footY-9}" width="${legW+11}" height="15" rx="7"/></g>`;
    }
    function armsFn(fill, line, handFill, handLine){
      return `<g fill="${fill}" stroke="${line}" stroke-width="2" stroke-linejoin="round">`+
        `<rect x="${lc-armW/2}" y="${aTop}" width="${armW}" height="${aBot-aTop}" rx="8.5"/>`+
        `<rect x="${rc-armW/2}" y="${aTop}" width="${armW}" height="${aBot-aTop}" rx="8.5"/></g>`+
        `<g fill="${handFill}" stroke="${handLine}" stroke-width="2">`+
        `<circle cx="${lc}" cy="${aBot+2}" r="9.5"/><circle cx="${rc}" cy="${aBot+2}" r="9.5"/></g>`;
    }
    function sleeveFn(endY, fill, line){
      return `<g fill="${fill}" stroke="${line}" stroke-width="2.5" stroke-linejoin="round">`+
        `<rect x="${lc-sleeveW/2}" y="${aTop-3}" width="${sleeveW}" height="${endY-(aTop-3)}" rx="9"/>`+
        `<rect x="${rc-sleeveW/2}" y="${aTop-3}" width="${sleeveW}" height="${endY-(aTop-3)}" rx="9"/></g>`;
    }
    function torsoFn(hipW, hemY, hemCurve, fill, line){
      return `<path d="M ${cx-sh} ${shoulderY} `+
        `C ${cx-sh-3} ${midY} ${cx-hipW-2} ${hemY-10} ${cx-hipW} ${hemY} `+
        `Q ${cx} ${hemY+hemCurve} ${cx+hipW} ${hemY} `+
        `C ${cx+sh+3} ${midY} ${cx+sh+3} ${midY} ${cx+sh} ${shoulderY} `+
        `Q ${cx} ${shoulderY+18} ${cx-sh} ${shoulderY} Z" `+
        `fill="${fill}" stroke="${line}" stroke-width="2.5" stroke-linejoin="round"/>`;
    }
    const roundCollar = `<path d="M ${cx-14} ${shoulderY+3} Q ${cx} ${shoulderY+19} ${cx+14} ${shoulderY+3}" `+
      `fill="none" stroke="${habitLine}" stroke-width="2.5" stroke-linecap="round"/>`;

    let bodyInner='', helmet='', hideHair=false;

    if(form==='cosmonaute'){
      const suitG='url(#gSuit)', suitL='#9aa7b5', boot='#c2ccd8', gl='#f4f7fb';
      const panel=`<rect x="${cx-16}" y="${midY-6}" width="32" height="26" rx="5" fill="${shade(habit,-0.04)}" stroke="${suitL}" stroke-width="2"/>`+
        `<circle cx="${cx-8}" cy="${midY+2}" r="3" fill="#ff5d5d"/><circle cx="${cx}" cy="${midY+2}" r="3" fill="#5dff8f"/>`+
        `<circle cx="${cx+8}" cy="${midY+2}" r="3" fill="#5db8ff"/>`+
        `<rect x="${cx-11}" y="${midY+10}" width="22" height="5" rx="2.5" fill="${habit}"/>`;
      const stripes=`<path d="M ${cx-sh} ${shoulderY+2} q 6 10 0 20" stroke="${habit}" stroke-width="4" fill="none"/>`+
        `<path d="M ${cx+sh} ${shoulderY+2} q -6 10 0 20" stroke="${habit}" stroke-width="4" fill="none"/>`;
      bodyInner = legsFn(suitG,suitL,boot,suitL) + torsoFn(hh+3,hipY+4,20,suitG,suitL) +
        stripes + panel + sleeveFn(aBot+2,suitG,suitL) + armsFn(suitG,suitL,gl,suitL);
      helmet =
        `<circle cx="${cx}" cy="${headCy}" r="${headRx+11}" fill="none" stroke="#f2f5f9" stroke-width="9"/>`+
        `<circle cx="${cx}" cy="${headCy}" r="${headRx+11}" fill="none" stroke="${suitL}" stroke-width="2"/>`+
        `<ellipse cx="${cx-13}" cy="${headCy-15}" rx="8" ry="15" fill="#fff" opacity="0.22"/>`;
      hideHair = true;
    }
    else if(form==='cavernes'){
      const furG='url(#gFur)', furL=shade('#8a6a45',-0.42);
      const loin=`<path d="M ${cx-hh+2} ${hipY-14} L ${cx+hh-2} ${hipY-14} L ${cx+hh-6} ${hipY+8} `+
        `L ${cx+hh-16} ${hipY-2} L ${cx+4} ${hipY+12} L ${cx-8} ${hipY-2} L ${cx-hh+8} ${hipY+10} Z" `+
        `fill="${furG}" stroke="${furL}" stroke-width="2" stroke-linejoin="round"/>`;
      const toga=`<path d="M ${cx-sh+2} ${shoulderY-2} L ${cx-sh+18} ${shoulderY-6} L ${cx+hh-4} ${hipY-6} `+
        `L ${cx+hh-16} ${hipY+4} L ${cx-6} ${hipY-10} L ${cx-sh+2} ${shoulderY+16} Z" `+
        `fill="${furG}" stroke="${furL}" stroke-width="2" stroke-linejoin="round"/>`;
      const spots=`<g fill="${furL}" opacity="0.5"><circle cx="${cx-14}" cy="${hipY-16}" r="2.5"/>`+
        `<circle cx="${cx+10}" cy="${hipY-8}" r="2.5"/><circle cx="${cx-2}" cy="${shoulderY+22}" r="2.5"/></g>`;
      bodyInner = legsFn('url(#gSkin)',skinLine,skin,skinLine) + torsoFn(hh,hipY,18,'url(#gSkin)',skinLine) +
        armsFn('url(#gSkin)',skinLine,'url(#gSkin)',skinLine) + loin + toga + spots;
    }
    else {
      let hipW=hh, hemY=hipY, hemCurve=18, sleeveEnd=longEnd, details='', drawSleeve=true;
      if(form==='tshirt'){ sleeveEnd=shortEnd; details=roundCollar; }
      else if(form==='pull'){ details=roundCollar; }
      else if(form==='chemise'){
        details=`<path d="M ${cx-11} ${shoulderY+1} L ${cx-1} ${shoulderY+3} L ${cx-8} ${shoulderY+15} Z" fill="${habitL}" stroke="${habitLine}" stroke-width="1.5" stroke-linejoin="round"/>`+
          `<path d="M ${cx+11} ${shoulderY+1} L ${cx+1} ${shoulderY+3} L ${cx+8} ${shoulderY+15} Z" fill="${habitL}" stroke="${habitLine}" stroke-width="1.5" stroke-linejoin="round"/>`+
          `<line x1="${cx}" y1="${shoulderY+8}" x2="${cx}" y2="${hipY-2}" stroke="${habitLine}" stroke-width="1.5" opacity="0.7"/>`+
          [0,1,2,3].map(i=>`<circle cx="${cx}" cy="${shoulderY+28+i*20}" r="1.8" fill="${habitLine}"/>`).join('');
      }
      else if(form==='robe'){ hipW=hh+24; hemY=hipY+44; hemCurve=26; sleeveEnd=shortEnd;
        details=roundCollar+`<path d="M ${cx-sh+4} ${midY+6} Q ${cx} ${midY+12} ${cx+sh-4} ${midY+6}" fill="none" stroke="${habitLine}" stroke-width="3" opacity="0.5"/>`;
      }
      else if(form==='debardeur'){ drawSleeve=false;
        details=`<path d="M ${cx-15} ${shoulderY+1} Q ${cx} ${shoulderY+24} ${cx+15} ${shoulderY+1} L ${cx+9} ${shoulderY-1} Q ${cx} ${shoulderY+17} ${cx-9} ${shoulderY-1} Z" fill="url(#gSkin)" stroke="${skinLine}" stroke-width="1.5" stroke-linejoin="round"/>`;
      }
      bodyInner = legsFn('url(#gPant)',pantLine,shoe,shade(shoe,-0.4)) +
        torsoFn(hipW,hemY,hemCurve,'url(#gCloth)',habitLine) + details +
        armsFn('url(#gSkin)',skinLine,'url(#gSkin)',skinLine) +
        (drawSleeve ? sleeveFn(sleeveEnd,'url(#gCloth)',habitLine) : '');
    }

    /* ---------- TÊTE / CHEVEUX / VISAGE ---------- */
    const neck = `<rect x="${cx-13}" y="${headBot-16}" width="26" height="30" rx="10" `+
      `fill="url(#gSkin)" stroke="${skinLine}" stroke-width="2"/>`;
    const head = `<ellipse cx="${cx}" cy="${headCy}" rx="${headRx}" ry="${headRy}" `+
      `fill="url(#gSkin)" stroke="${skinLine}" stroke-width="2.5"/>`;
    const ears = `<g fill="url(#gSkin)" stroke="${skinLine}" stroke-width="2">`+
      `<ellipse cx="${cx-headRx+2}" cy="${headCy+6}" rx="6.5" ry="10"/>`+
      `<ellipse cx="${cx+headRx-2}" cy="${headCy+6}" rx="6.5" ry="10"/></g>`;
    const cheeks = `<g fill="#ff7d7d" opacity="0.15">`+
      `<ellipse cx="${cx-19}" cy="${headCy+15}" rx="8" ry="5.5"/>`+
      `<ellipse cx="${cx+19}" cy="${headCy+15}" rx="8" ry="5.5"/></g>`;

    /* Cheveux */
    let hairBehind='', hairTop='';
    const st=state.cheveuxStyle;
    if(!hideHair && st!=='chauve'){
      const HR=headRx+2, VR=headRy+2, kx=+(HR*0.552).toFixed(1), ky=+(VR*0.552).toFixed(1);
      // calotte qui épouse le crâne (base commune à plusieurs coiffures)
      const calotte =
        `<path d="M ${cx-HR} ${headCy} `+
        `C ${cx-HR} ${headCy-ky} ${cx-kx} ${headCy-VR} ${cx} ${headCy-VR} `+
        `C ${cx+kx} ${headCy-VR} ${cx+HR} ${headCy-ky} ${cx+HR} ${headCy} `+
        `C ${cx+HR-8} ${headCy-15} ${cx+13} ${headCy-16} ${cx} ${headCy-16} `+
        `C ${cx-13} ${headCy-16} ${cx-HR+8} ${headCy-15} ${cx-HR} ${headCy} Z" `+
        `fill="url(#gHair)" stroke="${hairLine}" stroke-width="2" stroke-linejoin="round"/>`;

      if(st==='court'){ hairTop=calotte; }
      else if(st==='carre'){
        const yB=headBot+4;
        hairBehind=`<g fill="url(#gHair)" stroke="${hairLine}" stroke-width="2" stroke-linejoin="round">`+
          `<path d="M ${cx-HR} ${headCy-4} L ${cx-HR} ${yB} Q ${cx-HR+7} ${yB+5} ${cx-HR+13} ${yB} L ${cx-HR+13} ${headCy-4} Z"/>`+
          `<path d="M ${cx+HR} ${headCy-4} L ${cx+HR} ${yB} Q ${cx+HR-7} ${yB+5} ${cx+HR-13} ${yB} L ${cx+HR-13} ${headCy-4} Z"/></g>`;
        hairTop=calotte;
      }
      else if(st==='long'){
        const yE=shoulderY+50;
        hairBehind=
          `<path d="M ${cx-headRx+2} ${headCy-4} C ${cx-headRx-10} ${headCy+30} ${cx-headRx-7} ${yE-16} ${cx-headRx+6} ${yE} C ${cx-headRx+16} ${yE-22} ${cx-headRx+12} ${headCy+20} ${cx-headRx+9} ${headCy-2} Z" fill="url(#gHair)" stroke="${hairLine}" stroke-width="2" stroke-linejoin="round"/>`+
          `<path d="M ${cx+headRx-2} ${headCy-4} C ${cx+headRx+10} ${headCy+30} ${cx+headRx+7} ${yE-16} ${cx+headRx-6} ${yE} C ${cx+headRx-16} ${yE-22} ${cx+headRx-12} ${headCy+20} ${cx+headRx-9} ${headCy-2} Z" fill="url(#gHair)" stroke="${hairLine}" stroke-width="2" stroke-linejoin="round"/>`;
        hairTop=calotte;
      }
      else if(st==='couettes'){
        hairBehind=`<g fill="url(#gHair)" stroke="${hairLine}" stroke-width="2" stroke-linejoin="round">`+
          `<ellipse cx="${cx-HR-6}" cy="${headCy+18}" rx="11" ry="18"/>`+
          `<ellipse cx="${cx+HR+6}" cy="${headCy+18}" rx="11" ry="18"/></g>`+
          `<g fill="url(#gHair)"><circle cx="${cx-HR+3}" cy="${headCy+4}" r="6"/><circle cx="${cx+HR-3}" cy="${headCy+4}" r="6"/></g>`;
        hairTop=calotte;
      }
      else if(st==='chignon'){
        hairTop=calotte+`<circle cx="${cx}" cy="${headCy-VR-7}" r="12" fill="url(#gHair)" stroke="${hairLine}" stroke-width="2"/>`;
      }
      else if(st==='crete'){
        hairTop=`<path d="M ${cx} ${headCy-VR-16} C ${cx+12} ${headCy-VR-4} ${cx+10} ${headCy-8} ${cx+9} ${headCy-2} `+
          `L ${cx-9} ${headCy-2} C ${cx-10} ${headCy-8} ${cx-12} ${headCy-VR-4} ${cx} ${headCy-VR-16} Z" `+
          `fill="url(#gHair)" stroke="${hairLine}" stroke-width="2" stroke-linejoin="round"/>`;
      }
      else if(st==='boucle'){
        let back=''; [[-30,-8],[-31,-26],[-16,-39],[4,-44],[23,-38],[33,-20],[33,2]]
          .forEach(p=> back += `<circle cx="${cx+p[0]}" cy="${headCy+p[1]}" r="15"/>`);
        hairBehind=`<g fill="url(#gHair)">${back}</g>`;
        let front=''; [[-21,-6],[-7,-12],[7,-11],[20,-4]]
          .forEach(p=> front += `<circle cx="${cx+p[0]}" cy="${headCy+p[1]}" r="10"/>`);
        hairTop=`<g fill="url(#gHair)">${front}</g>`;
      }
    }

    /* Visage */
    const eyeY=headCy+3, dx=13;
    const eyes =
      `<ellipse cx="${cx-dx}" cy="${eyeY}" rx="5.5" ry="6.5" fill="#fff" stroke="${shade(skin,-0.28)}" stroke-width="1"/>`+
      `<ellipse cx="${cx+dx}" cy="${eyeY}" rx="5.5" ry="6.5" fill="#fff" stroke="${shade(skin,-0.28)}" stroke-width="1"/>`+
      `<circle cx="${cx-dx}" cy="${eyeY+1}" r="3" fill="#3a2a20"/>`+
      `<circle cx="${cx+dx}" cy="${eyeY+1}" r="3" fill="#3a2a20"/>`+
      `<circle cx="${cx-dx+1.2}" cy="${eyeY-0.6}" r="1.1" fill="#fff"/>`+
      `<circle cx="${cx+dx+1.2}" cy="${eyeY-0.6}" r="1.1" fill="#fff"/>`;
    const nose = `<path d="M ${cx-1} ${eyeY+6} Q ${cx-3} ${eyeY+12} ${cx+2} ${eyeY+12}" `+
      `fill="none" stroke="${skinD}" stroke-width="2" stroke-linecap="round"/>`;
    const mouth = `<path d="M ${cx-9} ${eyeY+18} Q ${cx} ${eyeY+26} ${cx+9} ${eyeY+18}" `+
      `fill="none" stroke="#b34b43" stroke-width="3" stroke-linecap="round"/>`;

    const beard = (state.barbe && !hideHair)
      ? `<path d="M ${cx-headRx+3} ${headCy+1} `+
        `Q ${cx-headRx+1} ${headBot+3} ${cx} ${headBot+6} `+
        `Q ${cx+headRx-1} ${headBot+3} ${cx+headRx-3} ${headCy+1} `+
        `Q ${cx} ${headCy+18} ${cx-headRx+3} ${headCy+1} Z" `+
        `fill="url(#gHair)" stroke="${hairLine}" stroke-width="2" stroke-linejoin="round" opacity="0.96"/>` : '';

    const glasses = state.lunettes
      ? `<g fill="#0b1220" fill-opacity="0.07" stroke="#161d29" stroke-width="2.5" stroke-linejoin="round">`+
        `<rect x="${cx-dx-8}" y="${eyeY-7}" width="16" height="14" rx="6"/>`+
        `<rect x="${cx+dx-8}" y="${eyeY-7}" width="16" height="14" rx="6"/></g>`+
        `<path d="M ${cx-5} ${eyeY-2} h 10" stroke="#161d29" stroke-width="2.5" fill="none"/>` : '';

    const bodyT  = `translate(${cx} ${hipY}) scale(${state.corpulence} 1) translate(${-cx} ${-hipY})`;
    const wholeT = `translate(${cx} ${footY}) scale(1 ${state.taille}) translate(${-cx} ${-footY})`;

    document.getElementById('avatar').innerHTML =
      defs + ground +
      `<g transform="${wholeT}">`+
        `<g transform="${bodyT}">${bodyInner}</g>`+
        neck + hairBehind + head + ears + hairTop + cheeks + beard +
        eyes + nose + mouth + glasses + helmet +
      `</g>`;

    document.getElementById('nomAff').textContent = state.nom || 'Explorateur·rice';
    const gl = {homme:'Homme', femme:'Femme', indifferent:'Indifférent'}[state.genre];
    document.getElementById('genreAff').textContent = gl;
  }

  /* --- Construction des contrôles --- */
  function swatches(hostId, list, key){
    const host=document.getElementById(hostId);
    host.innerHTML='';
    list.forEach(c=>{
      const b=document.createElement('div');
      b.className='sw'+(state[key]===c?' sel':''); b.style.background=c;
      b.title=c; b.onclick=()=>{ state[key]=c; markSel(host,b); render(); };
      host.appendChild(b);
    });
  }
  function chips(hostId, list, key){
    const host=document.getElementById(hostId);
    host.innerHTML='';
    list.forEach(([val,label])=>{
      const b=document.createElement('button');
      b.className='chip'+(state[key]===val?' sel':''); b.textContent=label;
      b.onclick=()=>{ state[key]=val; markSel(host,b); render(); };
      host.appendChild(b);
    });
  }
  function markSel(host,el){ [...host.children].forEach(c=>c.classList.remove('sel')); el.classList.add('sel'); }

  function buildOptions(){
    const host=document.getElementById('options'); host.innerHTML='';
    [['lunettes','👓 Lunettes'],['barbe','🧔 Barbe']].forEach(([key,label])=>{
      const b=document.createElement('button');
      b.className='chip'+(state[key]?' sel':''); b.textContent=label;
      b.onclick=()=>{ state[key]=!state[key]; b.classList.toggle('sel',state[key]); render(); };
      host.appendChild(b);
    });
  }

  function syncControls(){
    swatches('peau',PEAUX,'peau');
    swatches('cheveuxCouleur',CHEVEUX,'cheveuxCouleur');
    swatches('habit',HABITS,'habit');
    chips('genre',GENRES,'genre');
    chips('cheveuxStyle',STYLES,'cheveuxStyle');
    chips('habitForme',FORMES,'habitForme');
    buildOptions();
    document.getElementById('nom').value=state.nom;
    document.getElementById('taille').value=state.taille;
    document.getElementById('corpulence').value=state.corpulence;
  }

  /* --- Événements simples --- */
  document.getElementById('nom').addEventListener('input',e=>{ state.nom=e.target.value; render(); });
  document.getElementById('taille').addEventListener('input',e=>{ state.taille=parseFloat(e.target.value); render(); });
  document.getElementById('corpulence').addEventListener('input',e=>{ state.corpulence=parseFloat(e.target.value); render(); });

  /* --- Aléatoire --- */
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  document.getElementById('rand').onclick=()=>{
    state.genre=pick(GENRES)[0];
    state.peau=pick(PEAUX);
    state.cheveuxCouleur=pick(CHEVEUX);
    state.cheveuxStyle=pick(STYLES)[0];
    state.habit=pick(HABITS);
    state.habitForme=pick(FORMES)[0];
    state.taille=Math.round((0.86+Math.random()*0.28)*50)/50;
    state.corpulence=Math.round((0.82+Math.random()*0.46)*50)/50;
    state.lunettes=Math.random()<0.35;
    state.barbe=(state.genre!=='femme') && Math.random()<0.3;
    syncControls(); render();
  };

  /* --- Valider / sauvegarder --- */
  document.getElementById('go').onclick=()=>{
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
    const t=document.getElementById('toast');
    t.textContent = (state.nom? state.nom+', ton':'Ton')+' avatar est prêt ✓';
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2600);
    // TODO (à connecter ensuite) : lancer l'exploration, ex :
    // window.location.href = '../';   // ou une future page carte.html
  };

  /* --- API pour la suite du jeu --- */
  window.Avatar = {
    KEY: STORAGE_KEY,
    load(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)); }catch(e){ return null; } },
    current(){ return Object.assign({}, state); }
  };

  /* --- Init : reprend un avatar déjà sauvegardé si présent --- */
  const saved = window.Avatar.load();
  if(saved && typeof saved==='object'){ Object.assign(state, saved); }
  syncControls();
  render();
})();
</script>
</body>
</html>
