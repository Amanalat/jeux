<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Le parcours de l'explorateur — Exploration</title>
<style>
  :root{
    --txt:#0f2033; --doux:#40566f; --card:#ffffff; --bord:#d7e2f0;
    --acc:#2563eb; --ok:#16a34a; --lock:#94a3b8;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:system-ui,"Segoe UI",Roboto,sans-serif; color:var(--txt); min-height:100vh;
    background:linear-gradient(180deg,#bfe3ff 0%,#dcecff 30%,#e7f5e2 60%,#d5efcb 100%);
    background-attachment:fixed; }

  .topnav{ display:flex; gap:10px; align-items:center; padding:14px 18px; flex-wrap:wrap; }
  .topnav a, .topnav button.link{ color:var(--acc); text-decoration:none; font-size:.88em; font-weight:600;
    background:rgba(255,255,255,.75); padding:7px 12px; border-radius:999px; border:1px solid var(--bord); cursor:pointer; }
  .topnav a:hover, .topnav button.link:hover{ background:#fff; }
  .topnav .sp{ flex:1; }

  header{ text-align:center; padding:2px 18px 6px; }
  header h1{ margin:2px 0; font-size:1.5em; letter-spacing:-.3px; }
  header .greet{ color:var(--doux); }
  header .greet b{ color:var(--acc); }
  .progress{ color:var(--doux); font-size:.9em; margin-top:4px; }
  .progress b{ color:var(--ok); }

  /* Parcours */
  .map{ position:relative; max-width:720px; margin:8px auto 60px; }
  .road{ position:absolute; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; }
  .deco{ position:absolute; font-size:1.7em; opacity:.85; z-index:0; pointer-events:none;
    filter:drop-shadow(0 3px 2px rgba(0,0,0,.12)); }

  .stop{ position:absolute; transform:translate(-50%,-50%); z-index:2; width:150px;
    background:var(--card); border:1px solid var(--bord); border-radius:16px; padding:0; overflow:hidden;
    cursor:pointer; font:inherit; color:inherit; text-align:left;
    box-shadow:0 6px 16px rgba(20,40,70,.14); transition:transform .15s, box-shadow .15s, opacity .2s; }
  .stop:hover{ transform:translate(-50%,-50%) translateY(-3px); box-shadow:0 14px 28px rgba(20,40,70,.22); }
  .stop .roof{ height:46px; display:flex; align-items:center; justify-content:center; font-size:1.7em; color:#fff; }
  .stop .body{ padding:9px 11px 11px; }
  .stop .body b{ display:block; font-size:.98em; }
  .stop .body span{ color:var(--doux); font-size:.8em; }
  .stop .num{ position:absolute; top:8px; left:8px; width:22px; height:22px; border-radius:50%;
    background:rgba(255,255,255,.92); color:var(--txt); font-size:.72em; font-weight:800;
    display:flex; align-items:center; justify-content:center; }
  .stop .tag{ position:absolute; top:8px; right:8px; background:rgba(255,255,255,.92); color:var(--ok);
    border-radius:999px; padding:1px 7px; font-size:.7em; font-weight:800; display:none; }
  .stop.visite .tag{ display:inline-block; }

  .stop.lock{ cursor:not-allowed; filter:grayscale(.85) brightness(.98); opacity:.72; }
  .stop.lock .roof{ background:var(--lock) !important; }
  .stop.lock:hover{ transform:translate(-50%,-50%); box-shadow:0 6px 16px rgba(20,40,70,.14); }
  .stop .lockicon{ position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    font-size:1.8em; background:rgba(255,255,255,.35); }
  .stop.lock .lockicon{ display:flex; }
  .shake{ animation:shake .4s; }
  @keyframes shake{ 0%,100%{transform:translate(-50%,-50%)} 20%,60%{transform:translate(-54%,-50%)} 40%,80%{transform:translate(-46%,-50%)} }

  /* Avatar marcheur */
  .walker{ position:absolute; z-index:3; width:78px; transform:translate(-50%,-100%);
    transition:left 1.1s ease-in-out, top 1.1s ease-in-out; pointer-events:none; }
  .walker svg{ width:100%; height:auto; filter:drop-shadow(0 8px 8px rgba(0,0,0,.22)); }
  @keyframes bob{ 0%,100%{ transform:translate(-50%,-100%) rotate(-3deg);} 50%{ transform:translate(-50%,-107%) rotate(3deg);} }
  .walker.walking{ animation:bob .34s ease-in-out infinite; }

  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(120px);
    background:#0f1a2c; color:#fff; padding:12px 18px; border-radius:12px; font-weight:600; font-size:.9em;
    box-shadow:0 12px 30px rgba(0,0,0,.4); transition:transform .32s cubic-bezier(.2,1.4,.4,1); z-index:60; }
  .toast.show{ transform:translateX(-50%) translateY(0); }

  /* Lecteur du jeu */
  .player{ position:fixed; inset:0; background:#0b1220; display:none; flex-direction:column; z-index:100; }
  .player.open{ display:flex; }
  .player .bar{ display:flex; align-items:center; gap:10px; padding:10px 14px; background:#0f1a2c; color:#fff; }
  .player .bar .ttl{ font-weight:700; flex:1; }
  .player .bar button{ border:none; border-radius:10px; padding:9px 14px; font-weight:700; cursor:pointer; font-size:.9em; }
  .player .back{ background:#334155; color:#fff; }
  .player .fs{ background:#f7c948; color:#1a1200; }
  .player iframe{ flex:1; width:100%; border:none; background:#fff; }
</style>
</head>
<body>
  <div class="topnav">
    <a href="index.html">🧑‍🎨 Mon avatar</a>
    <button class="link" id="reset">↺ Recommencer le parcours</button>
    <span class="sp"></span>
    <a href="../index.html">🎮 Tous les jeux</a>
  </div>

  <header>
    <h1>🗺️ Le parcours de l'explorateur</h1>
    <div class="greet" id="greet">Avance de lieu en lieu&nbsp;: chaque étape en débloque une nouvelle.</div>
    <div class="progress" id="progress"></div>
  </header>

  <div class="map" id="map">
    <svg class="road" id="road" preserveAspectRatio="none" aria-hidden="true"></svg>
    <div class="walker" id="walker"><svg viewBox="0 0 240 380" aria-label="Ton avatar"></svg></div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="player" id="player">
    <div class="bar">
      <span class="ttl" id="player-ttl">Jeu</span>
      <button class="fs" id="player-fs" type="button">⛶ Plein écran</button>
      <button class="back" id="player-back" type="button">← Parcours</button>
    </div>
    <iframe id="player-frame" title="Jeu" allow="fullscreen" allowfullscreen></iframe>
  </div>

<script src="avatar-render.js"></script>
<script>
(function(){
  'use strict';
  var AV_KEY = 'jeux.exploration.avatar.v1';
  var PROG_KEY = 'jeux.exploration.progress.v2';

  var LIEUX = [
    { id:'radarnaque',    nom:"Radar'naque",         emoji:'🛡️', desc:'Déjouer les arnaques',            url:'../radarnaque/index.html',              col:'#ef4444' },
    { id:'fakemetre',     nom:'Fakemètre',           emoji:'🕵️', desc:"Mesurer la fiabilité",           url:'https://amanalat.github.io/fakemetre/', col:'#f59e0b' },
    { id:'chasse-biais',  nom:'Chasse aux biais',    emoji:'🎯', desc:'Débusquer les biais',            url:'../chasse-aux-biais/index.html',        col:'#10b981' },
    { id:'radar-desinfo', nom:'Radar désinfo',       emoji:'📡', desc:'Repérer la désinformation',      url:'../radar-desinfo/index.html',           col:'#3b82f6' },
    { id:'arene',         nom:'Arène de rhétorique', emoji:'⚔️', desc:'Reconnaître les sophismes',      url:'../arene-rhetorique/index.html',        col:'#8b5cf6' },
    { id:'repare-une',    nom:'Répare la une',       emoji:'📰', desc:'Corriger un journal trompeur',   url:'../repare-la-une/index.html',           col:'#ec4899' }
  ];

  // Géométrie du parcours (zigzag). x en unités 0..1000 ; y en pixels.
  var VBW = 1000, Y0 = 90, DY = 150;
  function stopX(i){ return (i % 2 === 0) ? 250 : 750; }   // colonnes gauche / droite
  function stopY(i){ return Y0 + i * DY; }
  var MAP_H = stopY(LIEUX.length - 1) + 110;

  function load(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
  function save(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

  var avatar = load(AV_KEY) || {};
  var prog = load(PROG_KEY) || { reached:1, visited:{}, pos:0 };
  if(!prog.visited) prog.visited = {};
  if(!prog.reached) prog.reached = 1;
  if(prog.pos == null) prog.pos = 0;

  var map = document.getElementById('map');
  map.style.height = MAP_H + 'px';
  var walker = document.getElementById('walker');
  walker.querySelector('svg').innerHTML = window.buildAvatarInner(avatar);

  // Salutation
  var nom = (avatar && avatar.nom) ? String(avatar.nom).replace(/[<>&]/g,'') : '';
  document.getElementById('greet').innerHTML = (nom ? 'En route, <b>'+nom+'</b>&nbsp;! ' : '')
    + 'Chaque étape franchie débloque la suivante.';

  // Route (SVG) reliant les étapes
  var road = document.getElementById('road');
  road.setAttribute('viewBox', '0 0 ' + VBW + ' ' + MAP_H);
  road.setAttribute('height', MAP_H);
  var d = 'M ' + stopX(0) + ' ' + stopY(0);
  for(var i=1;i<LIEUX.length;i++){
    var x0=stopX(i-1), y0=stopY(i-1), x1=stopX(i), y1=stopY(i), my=(y0+y1)/2;
    d += ' C ' + x0 + ' ' + my + ' ' + x1 + ' ' + my + ' ' + x1 + ' ' + y1; // courbe douce
  }
  road.innerHTML =
    '<path d="'+d+'" fill="none" stroke="#c9b18a" stroke-width="20" stroke-linecap="round" vector-effect="non-scaling-stroke"/>'+
    '<path d="'+d+'" fill="none" stroke="#fff6e0" stroke-width="4" stroke-dasharray="2 16" stroke-linecap="round" vector-effect="non-scaling-stroke" opacity="0.9"/>';

  // Décors
  ['🌳','🏔️','🌲','🌸','🌳','⛰️'].forEach(function(em, k){
    var el=document.createElement('div'); el.className='deco'; el.textContent=em;
    el.style.left = (k%2===0 ? 78 : 12) + '%';
    el.style.top = (60 + k*150) + 'px';
    map.appendChild(el);
  });

  function pctLeft(i){ return (stopX(i)/VBW*100) + '%'; }

  // Étapes
  var stopsEls = [];
  LIEUX.forEach(function(l, i){
    var b = document.createElement('button');
    b.type='button'; b.className='stop'; b.setAttribute('data-i', i);
    b.style.left = pctLeft(i);
    b.style.top = stopY(i) + 'px';
    b.innerHTML =
      '<span class="num">'+(i+1)+'</span>'+
      '<span class="tag">✓</span>'+
      '<div class="roof" style="background:'+l.col+'">'+l.emoji+'</div>'+
      '<div class="body"><b>'+l.nom+'</b><span>'+l.desc+'</span></div>'+
      '<div class="lockicon">🔒</div>';
    b.addEventListener('click', function(){ onStop(i); });
    map.appendChild(b);
    stopsEls.push(b);
  });

  function estDebloque(i){ return i < prog.reached; }

  function refresh(){
    LIEUX.forEach(function(l,i){
      var b = stopsEls[i];
      b.classList.toggle('lock', !estDebloque(i));
      b.classList.toggle('visite', !!prog.visited[l.id]);
    });
    var n = LIEUX.filter(function(l){ return prog.visited[l.id]; }).length;
    document.getElementById('progress').innerHTML =
      'Lieux visités : <b>'+n+'</b> / '+LIEUX.length +
      (n===LIEUX.length ? ' — parcours terminé, bravo ! 🎉' : '');
  }

  // Place l'avatar (sans animation) sur l'étape courante
  function placer(i){
    walker.style.left = pctLeft(i);
    walker.style.top = stopY(i) + 'px';
  }
  walker.style.transition = 'none';
  placer(prog.pos);
  void walker.offsetWidth;         // force le rendu avant de réactiver la transition
  walker.style.transition = '';
  refresh();

  var toast = document.getElementById('toast');
  function dire(msg){ toast.textContent = msg; toast.classList.add('show');
    clearTimeout(dire._t); dire._t=setTimeout(function(){ toast.classList.remove('show'); }, 2200); }

  var enMarche = false;
  function marcherVers(i, cb){
    if(prog.pos === i){ cb(); return; }
    enMarche = true;
    walker.classList.add('walking');
    walker.style.left = pctLeft(i);
    walker.style.top = stopY(i) + 'px';
    var fini=false;
    function fin(){ if(fini) return; fini=true; enMarche=false;
      walker.classList.remove('walking'); walker.removeEventListener('transitionend', fin);
      prog.pos = i; save(PROG_KEY, prog); cb(); }
    walker.addEventListener('transitionend', fin);
    setTimeout(fin, 1400);
  }

  function onStop(i){
    if(enMarche) return;
    if(!estDebloque(i)){
      stopsEls[i].classList.remove('shake'); void stopsEls[i].offsetWidth; stopsEls[i].classList.add('shake');
      dire('🔒 Termine d’abord l’étape ' + prog.reached + ' pour débloquer celle-ci.');
      return;
    }
    marcherVers(i, function(){ ouvrir(i); });
  }

  // Lecteur
  var player = document.getElementById('player');
  var frame = document.getElementById('player-frame');
  function ouvrir(i){
    var l = LIEUX[i];
    document.getElementById('player-ttl').textContent = l.emoji + ' ' + l.nom;
    frame.src = l.url;
    player.classList.add('open');
    document.body.style.overflow='hidden';
    // marque visité + débloque la suite
    var etaitFront = (i === prog.reached - 1);
    prog.visited[l.id] = true;
    if(etaitFront && prog.reached < LIEUX.length){ prog.reached++; }
    save(PROG_KEY, prog);
    refresh();
    if(etaitFront && prog.reached-1 === i+1){
      setTimeout(function(){ dire('🎉 Nouveau lieu débloqué : ' + LIEUX[i+1].nom + ' !'); }, 400);
    }
  }
  function fermer(){ player.classList.remove('open'); frame.src='about:blank'; document.body.style.overflow=''; }
  document.getElementById('player-back').onclick = fermer;
  document.getElementById('player-fs').onclick = function(){
    var r = frame.requestFullscreen || frame.webkitRequestFullscreen || frame.mozRequestFullScreen || frame.msRequestFullscreen;
    if(r){ r.call(frame); } else { window.open(frame.src, '_blank'); }
  };
  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && player.classList.contains('open')) fermer(); });

  document.getElementById('reset').onclick = function(){
    if(confirm('Recommencer le parcours à zéro ? (ton avatar est conservé)')){
      prog = { reached:1, visited:{}, pos:0 }; save(PROG_KEY, prog);
      placer(0); refresh(); dire('Parcours réinitialisé.');
    }
  };
})();
</script>
</body>
</html>
