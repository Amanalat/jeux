<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Éditeur — Niveau 3</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--accent:#cc44ff}
  body{font-family:system-ui,sans-serif;background:#f0f4f8;color:#1a1a2e;min-height:100vh}

  header{
    background:#1a1a2e;color:#fff;padding:14px 24px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.35)
  }
  header h1{font-size:1rem;font-weight:700;letter-spacing:.03em}
  header h1 span{color:var(--accent)}
  .subtitle{font-size:.72rem;color:#888;margin-top:2px}
  .header-right{display:flex;align-items:center;gap:10px}
  #count{font-size:.75rem;color:#888}

  .btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600;transition:opacity .15s}
  .btn:hover{opacity:.85}
  .btn-add{background:var(--accent);color:#fff}
  .btn-export{background:#fff;color:#1a1a2e}

  .container{max-width:820px;margin:0 auto;padding:24px 16px}

  .card{
    background:#fff;border-radius:10px;padding:18px 20px;margin-bottom:14px;
    box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--accent)
  }
  .card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .qnum{
    background:var(--accent);color:#fff;font-weight:700;font-size:.72rem;
    padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0
  }
  .cat-input{flex:1;font-size:.82rem;font-style:italic;color:#555}

  label{font-size:.68rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;display:block;margin:10px 0 4px}

  input[type=text],textarea{
    width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;
    font-size:.9rem;font-family:inherit;background:#fafafa;
    transition:border-color .15s,background .15s
  }
  input[type=text]:focus,textarea:focus{outline:none;border-color:var(--accent);background:#fff}
  textarea{resize:vertical;min-height:52px}

  .options-grid{display:flex;flex-direction:column;gap:6px}
  .opt-row{display:flex;align-items:center;gap:8px}
  .opt-idx{font-size:.72rem;color:#bbb;width:16px;text-align:center;flex-shrink:0}
  .opt-row input[type=radio]{accent-color:var(--accent);width:15px;height:15px;cursor:pointer;flex-shrink:0}
  .opt-row input[type=text]{flex:1}

  .correct-hint{font-size:.68rem;color:var(--accent);font-weight:normal;text-transform:none;letter-spacing:0}

  .card-footer{margin-top:14px;display:flex;justify-content:flex-end}
  .btn-del{
    padding:5px 12px;border:none;border-radius:5px;cursor:pointer;
    font-size:.72rem;font-weight:600;background:#fee2e2;color:#dc2626;transition:background .15s
  }
  .btn-del:hover{background:#fecaca}
</style>
</head>
<body>

<header>
  <div>
    <h1>Éditeur <span>Niveau 3</span> — Rhétorique &amp; Esprit Critique</h1>
    <div class="subtitle">questions-niveau3.js · QUESTIONS_NIVEAU3</div>
  </div>
  <div class="header-right">
    <span id="count"></span>
    <button class="btn btn-add" onclick="addQuestion()">+ Question</button>
    <button class="btn btn-export" onclick="exportJS()">⬇ Exporter .js</button>
  </div>
</header>

<div class="container">
  <div id="list"></div>
</div>

<script src="questions-niveau3.js"></script>
<script>
const VARNAME  = 'QUESTIONS_NIVEAU3';
const FILENAME = 'questions-niveau3.js';
let questions  = JSON.parse(JSON.stringify(QUESTIONS_NIVEAU3));

function render() {
  document.getElementById('count').textContent = questions.length + ' questions';
  const list = document.getElementById('list');
  list.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <span class="qnum">Q.${i+1}</span>
        <input type="text" class="cat-input" value="${esc(q.cat)}" placeholder="Catégorie">
      </div>
      <label>Question</label>
      <textarea class="f-q" rows="2">${esc(q.q)}</textarea>
      <label>Options &nbsp;<span class="correct-hint">● = bonne réponse</span></label>
      <div class="options-grid">
        ${q.options.map((opt,j)=>`
          <div class="opt-row">
            <span class="opt-idx">${j}</span>
            <input type="radio" name="r${i}" value="${j}" ${j===q.answer?'checked':''}>
            <input type="text" class="f-opt" value="${esc(opt)}" placeholder="Option ${j}">
          </div>`).join('')}
      </div>
      <label>Explication</label>
      <textarea class="f-expl" rows="2">${esc(q.expl||'')}</textarea>
      <div class="card-footer">
        <button class="btn-del" onclick="del(${i})">🗑 Supprimer</button>
      </div>`;
    list.appendChild(card);
  });
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function collect() {
  return Array.from(document.querySelectorAll('.card')).map((c,i)=>({
    cat:  c.querySelector('.cat-input').value,
    q:    c.querySelector('.f-q').value,
    options: Array.from(c.querySelectorAll('.f-opt')).map(e=>e.value),
    answer: +((c.querySelector(`input[name="r${i}"]:checked`)||{value:0}).value),
    expl: c.querySelector('.f-expl').value
  }));
}

function addQuestion(){
  questions = collect();
  questions.push({cat:'',q:'',options:['','','',''],answer:0,expl:''});
  render();
  window.scrollTo(0,document.body.scrollHeight);
}

function del(i){
  if(!confirm(`Supprimer Q.${i+1} ?`))return;
  questions = collect(); questions.splice(i,1); render();
}

function exportJS(){
  const data = collect();
  let s = `var ${VARNAME} = [\n`;
  s += data.map(q=>`  {\n    cat: ${JSON.stringify(q.cat)},\n    q: ${JSON.stringify(q.q)},\n    options: [\n      ${q.options.map(o=>JSON.stringify(o)).join(',\n      ')}\n    ],\n    answer: ${q.answer},\n    expl: ${JSON.stringify(q.expl)}\n  }`).join(',\n');
  s += '\n];\n';
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([s],{type:'text/javascript;charset=utf-8'})),download:FILENAME});
  a.click();
}

render();
</script>
</body>
</html>
