      points="582,458 720,488 649,563 511,533"
      fill="#797977"/>

<script src="../i18n.js"></script>
<script>
I18N.register({
  fr: { pageTitle: "Échiquier d'Adelson", h2: "Glissez A et B — même couleur, perçu différemment" },
  en: { pageTitle: "Adelson's Checkerboard", h2: "Drag A and B — same colour, perceived differently" }
});
const SVG_W = 1200, SVG_H = 929;

const ORIG = {
  a: { pts:[[595,258],[735,288],[664,363],[524,333]], cx:630, cy:311 },
  b: { pts:[[582,458],[720,488],[649,563],[511,533]], cx:616, cy:511 }
};

const off  = { a:[0,0], b:[0,0] };

function ptStr(id) {
  const [dx,dy] = off[id];
  return ORIG[id].pts.map(p => (p[0]+dx)+','+(p[1]+dy)).join(' ');
}

function apply(id) {
  const [dx,dy] = off[id];
  const cx = ORIG[id].cx+dx;
  const cy = ORIG[id].cy+dy;
  document.getElementById('p'+id).setAttribute('points', ptStr(id));
  document.getElementById('t'+id).setAttribute('x', cx);
  document.getElementById('t'+id).setAttribute('y', cy);
  document.getElementById('t'+id).setAttribute('transform',
    `translate(${cx},${cy}) rotate(12) skewX(-31.5) scale(1,0.853) translate(${-cx},${-cy})`);
}

function toSvg(clientX, clientY) {
  const r = document.getElementById('svg-ov').getBoundingClientRect();
  return [(clientX - r.left) / r.width * SVG_W,
          (clientY - r.top)  / r.height * SVG_H];
}

function drag(id) {
  const poly = document.getElementById('p'+id);
  const txt  = document.getElementById('t'+id);
  let active = false, s0 = [0,0], o0 = [0,0];

  function startDrag(cx, cy) {
    active = true;
    s0 = toSvg(cx, cy);
    o0 = [...off[id]];
  }

  function moveDrag(cx, cy) {
    if (!active) return;
    const [mx,my] = toSvg(cx,cy);
    off[id] = [o0[0]+mx-s0[0], o0[1]+my-s0[1]];
    apply(id);
  }

  function endDrag() {
    active = false;
  }

  poly.addEventListener('mousedown',  e => { e.preventDefault(); startDrag(e.clientX, e.clientY); });
  txt .addEventListener('mousedown',  e => { e.preventDefault(); startDrag(e.clientX, e.clientY); });
  poly.addEventListener('touchstart', e => { e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
  txt .addEventListener('touchstart', e => { e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});

  document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
  document.addEventListener('mouseup',   e => endDrag(e.clientX, e.clientY));
  document.addEventListener('touchmove', e => { if(active){ e.preventDefault(); moveDrag(e.touches[0].clientX, e.touches[0].clientY); }}, {passive:false});
  document.addEventListener('touchend',  e => endDrag(e.changedTouches[0].clientX, e.changedTouches[0].clientY));
}

drag('a'); drag('b');

</script>
