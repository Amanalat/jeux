<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ouvertures aux échecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="echecs.css">
</head>
<body>
<a class="back-hub" href="index.html">← Retour aux jeux</a>

  <header>
    <h1>Ouvertures aux échecs</h1>
    <p class="cred-atger">par <a href="https://antoninatger.com" target="_blank">Antonin Atger</a></p>
    <div id="mode-tabs">
      <button class="tab-btn active" data-mode="cours">Cours</button>
      <button class="tab-btn" data-mode="exercice">Exercice</button>
    </div>
  </header>

  <main>

    <!-- Échiquier -->
    <section id="board-section">
      <div id="board-wrapper">
        <div id="coords-top" class="coords coords-h"></div>
        <div id="board-row">
          <div id="coords-left" class="coords coords-v"></div>
          <div id="board"></div>
          <div id="coords-right" class="coords coords-v"></div>
        </div>
        <div id="coords-bottom" class="coords coords-h"></div>
      </div>
      <div id="board-controls">
        <button id="btn-flip">⬛ Jouer avec les noirs</button>
        <span id="player-indicator" class="player-indicator player-white">⬜ Blancs</span>
      </div>
    </section>

    <!-- Panneau latéral -->
    <aside id="panel">

      <!-- Panneau MODE COURS -->
      <div id="panel-cours" class="panel-mode active">
        <h2>Choisir une ouverture</h2>
        <div id="opening-categories"></div>

        <div id="cours-info" class="hidden">
          <h3 id="cours-name"></h3>
          <p id="cours-desc"></p>

          <div id="cours-progress">
            <span id="cours-step">Coup 0 / 0</span>
          </div>

          <div id="cours-comment" class="comment-box"></div>

          <div id="cours-controls">
            <button id="btn-prev">◀ Précédent</button>
            <button id="btn-play">▶ Lecture auto</button>
            <button id="btn-next">Suivant ▶</button>
          </div>

          <button id="btn-reset-cours">↩ Recommencer</button>
          <button id="btn-practice">🎯 Pratiquer cette ouverture</button>
        </div>
      </div>

      <!-- Panneau MODE EXERCICE -->
      <div id="panel-exercice" class="panel-mode hidden">
        <h2>Exercice</h2>

        <div id="exercice-setup">
          <label for="exo-opening-select">Ouverture :</label>
          <select id="exo-opening-select"></select>

          <fieldset id="exo-submode">
            <legend>Mode adversaire</legend>
            <label>
              <input type="radio" name="submode" value="auto" checked>
              Pièces adverses automatiques
            </label>
            <label>
              <input type="radio" name="submode" value="manuel">
              Tout jouer manuellement
            </label>
          </fieldset>

          <button id="btn-start-exo">Commencer</button>
        </div>

        <div id="exercice-play" class="hidden">
          <h3 id="exo-name"></h3>
          <div id="exo-turn-indicator"></div>
          <div id="exo-feedback" class="feedback-box"></div>
          <div id="exo-progress">
            <span id="exo-step">Coup 0 / 0</span>
            <span id="exo-errors">Erreurs : 0</span>
          </div>
          <div class="exo-btn-row">
            <button id="btn-hint">💡 Indice</button>
            <button id="btn-solution">👁 Solution</button>
          </div>
          <div class="exo-btn-row">
            <button id="btn-reset-exo">↩ Recommencer</button>
            <button id="btn-back-setup">← Changer</button>
          </div>
        </div>
      </div>

      <!-- Historique des coups -->
      <div id="moves-history">
        <h4>Coups joués</h4>
        <div id="moves-list"></div>
      </div>

      <!-- Score de session -->
      <div id="session-score">
        <span id="score-label">Session : 0 / 0 ouvertures</span>
      </div>

    </aside>
  </main>

  <script src="echecs-logic.js"></script>
  <script src="echecs-openings.js"></script>
  <script src="echecs-board.js"></script>
  <script src="echecs-app.js"></script>
</body>
</html>
